name: ci

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:11
          - debian:12
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends bash curl jq iproute2 openssl tar unzip ca-certificates shellcheck bats
      - name: ShellCheck and static validation
        run: bash tests/validate_static.sh
      - name: Bats
        run: bats tests
      - name: JSON validation
        run: find . -name '*.json' -not -path './.git/*' -print0 | xargs -0 -r jq empty
      - name: YAML basic validation
        run: bash -c "grep -RIl $'\t' .github README.md README_EN.md tests lib install.sh uninstall.sh && exit 1 || exit 0"
